<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AI Lens</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; overflow: hidden; background: #000;
      color: #fff;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      user-select: none; -webkit-user-select: none;
    }

    /* ─── Camera ─────────────────────────────────────────── */
    #app { position: fixed; inset: 0; background: #000; }

    #video {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; background: #000;
    }

    /* LUT overlay — CSS filter applied here */
    #lut-overlay {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 1;
      transition: none;
    }

    /* Gradient fades */
    .fade-top {
      position: absolute; top: 0; left: 0; right: 0; height: 180px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      z-index: 5; pointer-events: none;
    }
    .fade-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; height: 260px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      z-index: 5; pointer-events: none;
    }

    /* ─── Top bar ────────────────────────────────────────── */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: calc(env(safe-area-inset-top, 14px) + 14px) 22px 0;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }

    .ai-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transition: background 0.4s, box-shadow 0.4s;
      flex-shrink: 0;
    }
    .ai-dot.active {
      background: #30d158;
      box-shadow: 0 0 8px #30d158;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    .app-title {
      color: rgba(255,255,255,0.8);
      font-size: 20px;
      font-style: italic;
      font-weight: 200;
      letter-spacing: 1.5px;
    }

    .settings-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(20px);
      transition: background 0.2s, transform 0.15s;
    }
    .settings-btn:active { transform: scale(0.9); }

    /* ─── REC indicator ──────────────────────────────────── */
    .rec-badge {
      position: absolute; top: calc(env(safe-area-inset-top, 14px) + 60px); left: 22px;
      display: flex; align-items: center; gap: 6px;
      opacity: 0; transition: opacity 0.3s; z-index: 10;
    }
    .rec-badge.show { opacity: 1; }
    .rec-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #ff3b30;
      animation: rec-blink 1s ease-in-out infinite;
    }
    @keyframes rec-blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .rec-time {
      font-size: 13px; font-weight: 600; color: #fff;
      font-variant-numeric: tabular-nums; letter-spacing: 0.5px;
    }

    /* ─── Bottom controls ────────────────────────────────── */
    .bottom-area {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding-bottom: calc(env(safe-area-inset-bottom, 24px) + 24px);
    }

    /* Progress bar */
    .ai-progress-track {
      height: 1.5px; background: rgba(255,255,255,0.12); margin-bottom: 0;
    }
    .ai-progress-fill {
      height: 100%; background: rgba(255,255,255,0.45);
      transition: width 0.3s linear;
      width: 0%;
    }

    .controls-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; margin-top: 22px;
    }

    /* Profile indicator */
    .profile-display {
      width: 90px; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .profile-icon { font-size: 18px; }
    .profile-name {
      font-size: 11px; color: rgba(255,255,255,0.7);
      font-weight: 300; letter-spacing: 0.3px; text-align: center;
    }
    .profile-transition {
      font-size: 9px; color: rgba(255,255,255,0.35);
      letter-spacing: 0.3px;
    }

    /* Record button */
    .record-btn {
      width: 76px; height: 76px; border-radius: 50%; cursor: pointer;
      position: relative; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .record-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.9);
      transition: border-color 0.2s;
    }
    .record-inner {
      position: absolute; inset: 6px; border-radius: 50%;
      background: #fff;
      transition: border-radius 0.25s cubic-bezier(.4,0,.2,1),
                  background 0.2s,
                  inset 0.25s cubic-bezier(.4,0,.2,1);
    }
    .record-btn.recording .record-inner {
      inset: 18px;
      border-radius: 6px;
      background: #ff3b30;
    }
    .record-btn.pulsing {
      animation: rec-pulse 1s ease-in-out infinite;
    }
    @keyframes rec-pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Flip camera */
    .flip-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(20px);
      transition: transform 0.4s cubic-bezier(.4,0,.2,1), background 0.2s;
    }
    .flip-btn:active { transform: rotate(180deg); background: rgba(255,255,255,0.2); }

    /* ─── Toast ──────────────────────────────────────────── */
    .toast {
      position: absolute; bottom: calc(env(safe-area-inset-bottom, 24px) + 130px);
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.75); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px; padding: 10px 22px;
      font-size: 14px; font-weight: 500; color: #fff;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap; z-index: 20;
    }
    .toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }

    /* ─── Settings Sheet ─────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px); z-index: 100;
      display: flex; align-items: flex-end;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }

    .sheet {
      width: 100%; background: #1a1a1a;
      border-radius: 24px 24px 0 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 24px 22px calc(env(safe-area-inset-bottom, 20px) + 24px);
      transform: translateY(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    }
    .overlay.show .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.18); margin: 0 auto 24px;
    }
    .sheet-title {
      font-size: 22px; font-weight: 200; font-style: italic;
      color: #fff; margin-bottom: 24px; letter-spacing: 0.5px;
    }

    .field-label {
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    }
    .field {
      width: 100%; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 14px 16px;
      font-size: 15px; color: #fff; outline: none;
      font-family: inherit; margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .field:focus { border-color: rgba(255,255,255,0.3); }
    .field::placeholder { color: rgba(255,255,255,0.25); }

    .last-analysis {
      font-size: 12px; color: rgba(255,255,255,0.35);
      margin-bottom: 22px; min-height: 16px;
    }

    .save-btn {
      width: 100%; padding: 15px;
      background: #fff; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; color: #000;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }
    .save-btn:active { opacity: 0.85; transform: scale(0.98); }

    /* ─── Permission screen ──────────────────────────────── */
    #perm-screen {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      z-index: 200;
    }
    #perm-screen.hidden { display: none; }
    .perm-text { font-size: 18px; font-weight: 300; color: rgba(255,255,255,0.85); }
    .perm-btn {
      background: #fff; border: none; border-radius: 14px;
      padding: 14px 32px; font-size: 16px; font-weight: 600;
      color: #000; cursor: pointer; font-family: inherit;
    }

    /* ─── Download badge ─────────────────────────────────── */
    .dl-badge {
      position: absolute; top: calc(env(safe-area-inset-top, 14px) + 60px); right: 22px;
      display: flex; align-items: center; gap: 7px;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
      padding: 7px 14px; font-size: 13px; color: #fff; cursor: pointer;
      opacity: 0; transition: opacity 0.3s; z-index: 10;
      pointer-events: none;
    }
    .dl-badge.show { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>

<div id="perm-screen">
  <div class="perm-text">Нужен доступ к камере</div>
  <button class="perm-btn" id="perm-btn">Дать доступ</button>
</div>

<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <div id="lut-overlay"></div>

  <div class="fade-top"></div>
  <div class="fade-bottom"></div>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="ai-dot" id="ai-dot"></div>
    <div class="app-title">AI Lens</div>
    <button class="settings-btn" id="settings-btn">⚙️</button>
  </div>

  <!-- REC indicator -->
  <div class="rec-badge" id="rec-badge">
    <div class="rec-dot"></div>
    <div class="rec-time" id="rec-time">0:00</div>
  </div>

  <!-- Download last video -->
  <div class="dl-badge" id="dl-badge" onclick="downloadVideo()">
    <span>⬇</span><span id="dl-label">Скачать видео</span>
  </div>

  <!-- Bottom -->
  <div class="bottom-area">
    <div class="ai-progress-track">
      <div class="ai-progress-fill" id="progress-fill"></div>
    </div>

    <div class="controls-row">
      <!-- Profile (left) -->
      <div class="profile-display" id="profile-display">
        <div class="profile-icon" id="profile-icon">☀️</div>
        <div class="profile-name" id="profile-name">Дневной</div>
        <div class="profile-transition" id="profile-transition"></div>
      </div>

      <!-- Record button (center) -->
      <div class="record-btn" id="record-btn" onclick="toggleRecord()">
        <div class="record-ring"></div>
        <div class="record-inner"></div>
      </div>

      <!-- Flip (right) -->
      <div style="width:90px;display:flex;justify-content:center">
        <button class="flip-btn" id="flip-btn">⟳</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<!-- Settings -->
<div class="overlay" id="settings-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Настройки</div>
    <div class="field-label">Anthropic API ключ</div>
    <input type="password" class="field" id="api-key-field" placeholder="sk-ant-...">
    <div class="last-analysis" id="last-analysis-text"></div>
    <button class="save-btn" id="save-settings-btn">Сохранить</button>
  </div>
</div>

<script>
// ─── Color Profiles ──────────────────────────────────────────────────────────
const PROFILES = {
  'Дневной':      { icon: '☀️', css: 'brightness(1) contrast(1) saturate(1)' },
  'Золотой час':  { icon: '🌅', css: 'brightness(1.05) contrast(1.05) saturate(1.3) sepia(0.18)' },
  'Пасмурно':     { icon: '☁️', css: 'brightness(0.97) contrast(1.05) saturate(0.85) hue-rotate(10deg)' },
  'Ночной':       { icon: '🌙', css: 'brightness(1.15) contrast(0.9) saturate(0.9) sepia(0.12)' },
  'Портрет':      { icon: '👤', css: 'brightness(1.05) contrast(0.95) saturate(1.1)' },
  'Кино':         { icon: '🎬', css: 'brightness(0.9) contrast(1.35) saturate(1.2) hue-rotate(-5deg)' },
  'Помещение':    { icon: '💡', css: 'brightness(1.0) contrast(1.0) saturate(0.95) hue-rotate(15deg)' },
};

// ─── State ───────────────────────────────────────────────────────────────────
const S = {
  apiKey: localStorage.getItem('ai_lens_key') || '',
  facingMode: 'environment',
  stream: null,
  currentProfile: 'Дневной',
  targetProfile: 'Дневной',
  isRecording: false,
  mediaRecorder: null,
  recordedChunks: [],
  lastVideoBlob: null,
  recStartTime: null,
  recTimer: null,
  aiInterval: null,
  progressInterval: null,
  aiCycleStart: null,
  AI_INTERVAL: 30000,
  lastAnalysis: JSON.parse(localStorage.getItem('ai_lens_last') || 'null'),
  transitioning: false,
};

// ─── Camera ───────────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    if (S.stream) S.stream.getTracks().forEach(t => t.stop());
    S.stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: S.facingMode },
        width: { ideal: 1920 }, height: { ideal: 1080 },
        frameRate: { ideal: 30 }
      },
      audio: true
    });
    document.getElementById('video').srcObject = S.stream;
    document.getElementById('perm-screen').classList.add('hidden');
    applyProfile(S.currentProfile, false);
    startAICycle();
  } catch(e) {
    try {
      S.stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('video').srcObject = S.stream;
      document.getElementById('perm-screen').classList.add('hidden');
      startAICycle();
    } catch(e2) {
      console.warn('Camera error:', e2.message);
    }
  }
}

document.getElementById('perm-btn').addEventListener('click', startCamera);
document.getElementById('flip-btn').addEventListener('click', () => {
  S.facingMode = S.facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
  // Trigger AI on camera switch
  setTimeout(runAI, 500);
});

// ─── LUT / Color Profile ─────────────────────────────────────────────────────
function applyProfile(name, animate = true) {
  const p = PROFILES[name];
  if (!p) return;

  if (animate && S.currentProfile !== name) {
    S.transitioning = true;
    document.getElementById('profile-transition').textContent = '• обновление';

    // Smooth transition via opacity fade on overlay
    const overlay = document.getElementById('lut-overlay');
    overlay.style.transition = 'opacity 0.5s ease';
    overlay.style.opacity = '0';

    setTimeout(() => {
      overlay.style.filter = p.css;
      overlay.style.opacity = '1';
      setTimeout(() => {
        overlay.style.transition = 'none';
        S.transitioning = false;
        document.getElementById('profile-transition').textContent = '';
      }, 500);
    }, 250);
  } else {
    document.getElementById('lut-overlay').style.filter = p.css;
    document.getElementById('lut-overlay').style.opacity = '1';
  }

  // Apply the filter on video directly too
  document.getElementById('video').style.filter = p.css;

  S.currentProfile = name;
  document.getElementById('profile-icon').textContent = p.icon;
  document.getElementById('profile-name').textContent = name;

  // Save
  localStorage.setItem('ai_lens_profile', name);
}

// ─── Recording ───────────────────────────────────────────────────────────────
function toggleRecord() {
  if (S.isRecording) stopRecord();
  else startRecord();
}

function startRecord() {
  if (!S.stream) return;

  S.recordedChunks = [];
  const mimeType = getSupportedMime();
  const options = mimeType ? { mimeType } : {};

  try {
    S.mediaRecorder = new MediaRecorder(S.stream, options);
  } catch(e) {
    S.mediaRecorder = new MediaRecorder(S.stream);
  }

  S.mediaRecorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) S.recordedChunks.push(e.data);
  };

  S.mediaRecorder.onstop = () => {
    const mime = S.mediaRecorder.mimeType || 'video/mp4';
    S.lastVideoBlob = new Blob(S.recordedChunks, { type: mime });
    document.getElementById('dl-badge').classList.add('show');
    showToast('✓ Видео готово');
  };

  S.mediaRecorder.start(1000); // collect chunks every 1s
  S.isRecording = true;
  S.recStartTime = Date.now();

  document.getElementById('record-btn').classList.add('recording', 'pulsing');
  document.getElementById('rec-badge').classList.add('show');
  document.getElementById('dl-badge').classList.remove('show');

  S.recTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - S.recStartTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = String(elapsed % 60).padStart(2, '0');
    document.getElementById('rec-time').textContent = `${m}:${s}`;
  }, 500);
}

function stopRecord() {
  if (!S.mediaRecorder || S.mediaRecorder.state === 'inactive') return;
  S.mediaRecorder.stop();
  S.isRecording = false;

  clearInterval(S.recTimer);
  document.getElementById('record-btn').classList.remove('recording', 'pulsing');
  document.getElementById('rec-badge').classList.remove('show');
}

function getSupportedMime() {
  const types = ['video/mp4;codecs=h264', 'video/mp4', 'video/webm;codecs=vp9', 'video/webm'];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
}

function downloadVideo() {
  if (!S.lastVideoBlob) return;
  const url = URL.createObjectURL(S.lastVideoBlob);
  const ext = S.lastVideoBlob.type.includes('mp4') ? 'mp4' : 'webm';
  const a = document.createElement('a');
  a.href = url;
  a.download = `ai-lens-${Date.now()}.${ext}`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// ─── AI Analysis ─────────────────────────────────────────────────────────────
function frameBase64() {
  const v = document.getElementById('video');
  if (!v.videoWidth) return null;
  const c = document.createElement('canvas');
  c.width = 320;
  c.height = Math.round((v.videoHeight / v.videoWidth) * 320);
  const ctx = c.getContext('2d');
  if (S.facingMode === 'user') {
    ctx.save(); ctx.translate(c.width, 0); ctx.scale(-1, 1);
  }
  ctx.drawImage(v, 0, 0, c.width, c.height);
  if (S.facingMode === 'user') ctx.restore();
  return c.toDataURL('image/jpeg', 0.7).replace(/^data:image\/\w+;base64,/, '');
}

async function runAI() {
  if (!S.apiKey) return;

  const b64 = frameBase64();
  if (!b64) return;

  const dot = document.getElementById('ai-dot');
  dot.classList.add('active');

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': S.apiKey },
      body: JSON.stringify({ imageBase64: b64, mode: 'profile' })
    });
    if (!res.ok) return;
    const data = await res.json();
    if (data.profile && PROFILES[data.profile]) {
      applyProfile(data.profile, true);
      S.lastAnalysis = { profile: data.profile, timestamp: Date.now() };
      localStorage.setItem('ai_lens_last', JSON.stringify(S.lastAnalysis));
    }
  } catch(e) {
    // silent
  } finally {
    dot.classList.remove('active');
  }
}

function startAICycle() {
  clearInterval(S.aiInterval);
  clearInterval(S.progressInterval);

  S.aiCycleStart = Date.now();
  runAI();

  S.progressInterval = setInterval(() => {
    const elapsed = Date.now() - S.aiCycleStart;
    const pct = Math.min((elapsed / S.AI_INTERVAL) * 100, 100);
    document.getElementById('progress-fill').style.width = pct + '%';
  }, 300);

  S.aiInterval = setInterval(() => {
    S.aiCycleStart = Date.now();
    document.getElementById('progress-fill').style.width = '0%';
    runAI();
  }, S.AI_INTERVAL);
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Settings ─────────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('api-key-field').value = S.apiKey;
  updateLastAnalysisText();
  document.getElementById('settings-overlay').classList.add('show');
}

function updateLastAnalysisText() {
  const el = document.getElementById('last-analysis-text');
  if (!S.lastAnalysis) { el.textContent = ''; return; }
  const secs = Math.round((Date.now() - S.lastAnalysis.timestamp) / 1000);
  const t = secs < 60 ? `${secs} сек назад` : `${Math.round(secs / 60)} мин назад`;
  el.textContent = `Последний анализ: ${S.lastAnalysis.profile} • ${t}`;
}

document.getElementById('settings-btn').addEventListener('click', openSettings);

document.getElementById('settings-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('settings-overlay')) {
    document.getElementById('settings-overlay').classList.remove('show');
  }
});

document.getElementById('save-settings-btn').addEventListener('click', () => {
  S.apiKey = document.getElementById('api-key-field').value.trim();
  localStorage.setItem('ai_lens_key', S.apiKey);
  document.getElementById('settings-overlay').classList.remove('show');
  if (S.apiKey) setTimeout(runAI, 300);
});

// ─── Init ─────────────────────────────────────────────────────────────────────
navigator.mediaDevices?.getUserMedia({ video: true, audio: true })
  .then(stream => {
    // got permission immediately
    stream.getTracks().forEach(t => t.stop());
    startCamera();
  })
  .catch(() => {
    // show permission screen
  });

if (!S.apiKey) setTimeout(openSettings, 700);

// Restore last profile
const savedProfile = localStorage.getItem('ai_lens_profile');
if (savedProfile && PROFILES[savedProfile]) {
  S.currentProfile = savedProfile;

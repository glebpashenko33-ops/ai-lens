<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AI Lens</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; overflow: hidden; background: #000; user-select: none; -webkit-user-select: none; }

    /* ─── Camera layer ─── */
    #app { position: fixed; inset: 0; }

    #video {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; background: #000;
    }

    /* Canvas for real-time LUT/grain rendering */
    #fx-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; opacity: 0;
      transition: opacity 0.8s ease;
    }
    #fx-canvas.active { opacity: 1; }

    /* Vignette overlay */
    #vignette {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0) 100%);
      transition: background 1.2s ease;
      z-index: 2;
    }

    /* Film grain overlay */
    #grain {
      position: absolute; inset: 0; pointer-events: none; z-index: 3;
      opacity: 0; mix-blend-mode: overlay;
    }

    /* ─── UI overlay ─── */
    .ui {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column; justify-content: flex-end;
      pointer-events: none;
    }

    /* Bottom fade */
    .bottom-fade {
      position: absolute; bottom: 0; left: 0; right: 0; height: 200px;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
      pointer-events: none;
    }

    /* AI status — top left, barely visible */
    .ai-status {
      position: absolute;
      top: calc(env(safe-area-inset-top, 12px) + 16px);
      left: 20px;
      display: flex; align-items: center; gap: 7px;
      pointer-events: none;
    }
    .ai-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.4s, box-shadow 0.4s;
    }
    .ai-dot.on { background: #30d158; box-shadow: 0 0 6px #30d158; animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .ai-label {
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 11px; font-weight: 300;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
      transition: color 0.4s;
    }
    .ai-label.on { color: rgba(255,255,255,0.5); }

    /* Settings button — top right */
    .settings-btn {
      position: absolute;
      top: calc(env(safe-area-inset-top, 12px) + 10px);
      right: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,0.25); border: none;
      color: rgba(255,255,255,0.5); font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto; backdrop-filter: blur(10px);
      transition: background 0.2s;
    }
    .settings-btn:active { background: rgba(255,255,255,0.15); }

    /* REC timer */
    .rec-timer {
      position: absolute;
      top: calc(env(safe-area-inset-top, 12px) + 18px);
      left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 7px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .rec-timer.show { opacity: 1; }
    .rec-dot { width: 7px; height: 7px; border-radius: 50%; background: #ff3b30; animation: blink 1s infinite; }
    .rec-time {
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 14px; font-weight: 500; color: #fff;
      font-variant-numeric: tabular-nums;
    }

    /* Controls */
    .controls {
      display: flex; align-items: center; justify-content: center;
      gap: 52px;
      padding-bottom: calc(env(safe-area-inset-bottom, 28px) + 32px);
      padding-top: 14px;
      pointer-events: auto; position: relative;
    }

    /* Record button */
    .rec-btn {
      width: 58px; height: 58px; border-radius: 50%;
      position: relative; cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .rec-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.9);
    }
    .rec-inner {
      position: absolute; inset: 6px; border-radius: 50%;
      background: #ff3b30;
      transition: border-radius 0.22s cubic-bezier(.4,0,.2,1),
                  inset 0.22s cubic-bezier(.4,0,.2,1);
    }
    .rec-btn.recording .rec-inner {
      inset: 16px; border-radius: 4px;
    }
    .rec-btn.recording { animation: pulse-rec 1.1s ease-in-out infinite; }
    @keyframes pulse-rec { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

    /* Flip button */
    .flip-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff; font-size: 19px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
      backdrop-filter: blur(20px);
      transition: transform 0.38s cubic-bezier(.4,0,.2,1), background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .flip-btn:active { background: rgba(255,255,255,0.25); }
    .flip-btn.spinning { transform: rotate(180deg); }

    /* Toast */
    .toast {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 28px) + 120px);
      left: 50%; transform: translateX(-50%) translateY(10px);
      background: rgba(0,0,0,0.7); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px; padding: 9px 20px;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.9);
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap; z-index: 20;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Permission screen */
    #perm {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      z-index: 100; font-family: -apple-system, system-ui, sans-serif;
    }
    #perm.hidden { display: none; }
    #perm p { color: rgba(255,255,255,0.75); font-size: 17px; font-weight: 300; }
    #perm button {
      background: #fff; border: none; border-radius: 14px;
      padding: 13px 36px; font-size: 16px; font-weight: 600;
      color: #000; cursor: pointer; font-family: inherit;
    }

    /* Settings sheet */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px); z-index: 50;
      display: flex; align-items: flex-end;
      opacity: 0; transition: opacity 0.28s; pointer-events: none;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .sheet {
      width: 100%; background: #161616;
      border-radius: 22px 22px 0 0;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 22px 20px calc(env(safe-area-inset-bottom, 20px) + 22px);
      transform: translateY(100%); transition: transform 0.32s cubic-bezier(.4,0,.2,1);
      font-family: -apple-system, system-ui, sans-serif;
    }
    .overlay.show .sheet { transform: translateY(0); }
    .sheet-handle { width: 34px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.15); margin: 0 auto 22px; }
    .sheet-title { font-size: 20px; font-weight: 200; font-style: italic; color: #fff; margin-bottom: 22px; letter-spacing: 0.3px; }
    .field-lbl { font-size: 11px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 9px; }
    .field {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 11px; padding: 13px 15px; font-size: 15px; color: #fff;
      outline: none; font-family: inherit; margin-bottom: 8px; transition: border-color 0.2s;
    }
    .field:focus { border-color: rgba(255,255,255,0.25); }
    .field::placeholder { color: rgba(255,255,255,0.2); }
    .field-hint { font-size: 11px; color: rgba(255,255,255,0.25); margin-bottom: 22px; line-height: 1.5; }
    .save-btn {
      width: 100%; padding: 14px; background: #fff; border: none; border-radius: 13px;
      font-size: 15px; font-weight: 600; color: #000; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .save-btn:active { opacity: 0.8; }
  </style>
</head>
<body>

<div id="perm">
  <p>Нужен доступ к камере</p>
  <button onclick="initCamera()">Разрешить</button>
</div>

<!-- Per-channel Lift/Gamma/Gain color corrector (Blackmagic/Resolve Primaries model).
     feFunc: output = amplitude * input^exponent + offset  →  amplitude=Gain, exponent~Gamma, offset=Lift -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="bmd-grade" color-interpolation-filters="sRGB">
    <feComponentTransfer>
      <feFuncR id="fnR" type="gamma" amplitude="1" exponent="1" offset="0"/>
      <feFuncG id="fnG" type="gamma" amplitude="1" exponent="1" offset="0"/>
      <feFuncB id="fnB" type="gamma" amplitude="1" exponent="1" offset="0"/>
    </feComponentTransfer>
  </filter>
</svg>

<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="fx-canvas"></canvas>
  <div id="vignette"></div>
  <canvas id="grain"></canvas>

  <div class="ui">
    <div class="bottom-fade"></div>

    <!-- AI status -->
    <div class="ai-status">
      <div class="ai-dot" id="ai-dot"></div>
      <div class="ai-label" id="ai-label">AI LENS</div>
    </div>

    <!-- Settings -->
    <button class="settings-btn" id="settings-btn">⚙</button>

    <!-- REC timer -->
    <div class="rec-timer" id="rec-timer">
      <div class="rec-dot"></div>
      <div class="rec-time" id="rec-time">0:00</div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="rec-btn" id="rec-btn" onclick="toggleRecord()">
        <div class="rec-ring"></div>
        <div class="rec-inner"></div>
      </div>
      <button class="flip-btn" id="flip-btn" onclick="flipCamera()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<!-- Settings sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Настройки</div>
    <div class="field-lbl">Anthropic API ключ</div>
    <input type="password" class="field" id="api-field" placeholder="sk-ant-...">
    <div class="field-hint">Необязательно, если ключ задан на сервере.<br>Получить свой: console.anthropic.com — хранится только в браузере.</div>
    <button class="save-btn" onclick="saveSettings()">Сохранить</button>
  </div>
</div>

<script>
// ─── LUT presets — base cinematic grade layered under the AI's per-shot params.
// liftR/G/B = shadow tint (offset), gainR/G/B = highlight tint (multiplier),
// contrast/saturate/hueRot = global tone. "teal&orange" = cool lifts + warm gains.
const LUTS = {
  natural:   { liftR: 0,     liftG: 0,     liftB: 0,     gainR: 1,    gainG: 1,    gainB: 1,    contrast: 1.0,  saturate: 1.0,  hueRot: 0 },
  film:      { liftR: -0.01, liftG: 0,     liftB: 0.02,  gainR: 1.04, gainG: 1.0,  gainB: 0.97, contrast: 0.95, saturate: 0.9,  hueRot: -2 },
  cinematic: { liftR: -0.02, liftG: 0,     liftB: 0.03,  gainR: 1.08, gainG: 1.0,  gainB: 0.94, contrast: 1.15, saturate: 1.2,  hueRot: -4 },
  portrait:  { liftR: 0.01,  liftG: 0.005, liftB: 0,     gainR: 1.05, gainG: 1.0,  gainB: 0.98, contrast: 0.98, saturate: 1.08, hueRot: 2 },
  night:     { liftR: 0,     liftG: 0.01,  liftB: 0.03,  gainR: 1.0,  gainG: 1.0,  gainB: 1.02, contrast: 1.05, saturate: 0.8,  hueRot: 4 },
  golden:    { liftR: 0.02,  liftG: 0,     liftB: -0.01, gainR: 1.12, gainG: 1.02, gainB: 0.9,  contrast: 1.05, saturate: 1.25, hueRot: 6 },
};

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  apiKey: localStorage.getItem('ailens_key') || '',
  hasServerKey: false,
  facing: 'environment',
  stream: null,
  isRecording: false,
  recorder: null,
  chunks: [],
  lastBlob: null,
  recStart: null,
  recTick: null,
  aiTimer: null,
  aiActive: false,
  renderRunning: false,
  cur: defaultParams(),
  tgt: defaultParams(),
  animFrame: null,
};

function defaultParams() {
  return {
    exposure: 0, temperature: 5600, tint: 0,
    contrast: 1, pivot: 0.5, saturation: 1, hue: 0,
    liftR: 0, liftG: 0, liftB: 0,
    gammaR: 0, gammaG: 0, gammaB: 0,
    gainR: 1, gainG: 1, gainB: 1,
    sharpness: 0.5, vignette: 0, filmGrain: 0, lut: 'natural',
  };
}

// ─── Camera ───────────────────────────────────────────────────────────────────
async function initCamera() {
  try {
    if (S.stream) S.stream.getTracks().forEach(t => t.stop());
    S.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: S.facing }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: true,
    });
    document.getElementById('video').srcObject = S.stream;
    document.getElementById('perm').classList.add('hidden');
    scheduleAI(1500);
    if (!S.renderRunning) startRenderLoop();
  } catch (e) {
    try {
      S.stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('video').srcObject = S.stream;
      document.getElementById('perm').classList.add('hidden');
      scheduleAI(1500);
      if (!S.renderRunning) startRenderLoop();
    } catch (e2) {
      document.querySelector('#perm p').textContent = 'Камера недоступна: ' + e2.message;
    }
  }
}

function flipCamera() {
  const btn = document.getElementById('flip-btn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 400);
  S.facing = S.facing === 'environment' ? 'user' : 'environment';
  initCamera();
}

// ─── Recording ────────────────────────────────────────────────────────────────
function toggleRecord() {
  S.isRecording ? stopRecord() : startRecord();
}

function startRecord() {
  if (!S.stream) return;
  S.chunks = [];
  const mime = ['video/mp4;codecs=h264','video/mp4','video/webm;codecs=vp9','video/webm']
    .find(t => MediaRecorder.isTypeSupported(t)) || '';
  try { S.recorder = new MediaRecorder(S.stream, mime ? { mimeType: mime } : {}); }
  catch { S.recorder = new MediaRecorder(S.stream); }

  S.recorder.ondataavailable = e => { if (e.data?.size) S.chunks.push(e.data); };
  S.recorder.onstop = () => {
    S.lastBlob = new Blob(S.chunks, { type: S.recorder.mimeType });
    saveVideo();
  };
  S.recorder.start(1000);
  S.isRecording = true;
  S.recStart = Date.now();
  document.getElementById('rec-btn').classList.add('recording');
  document.getElementById('rec-timer').classList.add('show');

  S.recTick = setInterval(() => {
    const s = Math.floor((Date.now() - S.recStart) / 1000);
    document.getElementById('rec-time').textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }, 500);
}

function stopRecord() {
  if (S.recorder?.state !== 'inactive') S.recorder.stop();
  S.isRecording = false;
  clearInterval(S.recTick);
  document.getElementById('rec-btn').classList.remove('recording');
  document.getElementById('rec-timer').classList.remove('show');
}

async function saveVideo() {
  if (!S.lastBlob) return;
  const ext = S.lastBlob.type.includes('mp4') ? 'mp4' : 'webm';
  const fileName = `ailens-${Date.now()}.${ext}`;

  // 1) Native share/save sheet (lets user save to gallery on mobile)
  try {
    const file = new File([S.lastBlob], fileName, { type: S.lastBlob.type });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'AI Lens' });
      toast('✓ Видео сохранено');
      return;
    }
  } catch (e) {
    if (e.name === 'AbortError') return; // user cancelled share sheet
  }

  // 2) Fallback — auto download to device
  const url = URL.createObjectURL(S.lastBlob);
  const a = document.createElement('a');
  a.href = url; a.download = fileName; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
  toast('✓ Видео сохранено');
}

// ─── AI Analysis ─────────────────────────────────────────────────────────────
function scheduleAI(delay = 30000) {
  clearTimeout(S.aiTimer);
  S.aiTimer = setTimeout(runAI, delay);
}

async function runAI() {
  if (!S.apiKey && !S.hasServerKey) { scheduleAI(30000); return; }
  const b64 = captureFrame();
  if (!b64) { scheduleAI(10000); return; }

  setAIActive(true);
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': S.apiKey },
      body: JSON.stringify({ imageBase64: b64 }),
    });
    if (res.ok) {
      const params = await res.json();
      applyAIParams(params);
      // Brief visual confirmation
      const lutName = params.lut || 'natural';
      const lutLabels = { natural:'Нейтральный', film:'Плёнка', cinematic:'Кино', portrait:'Портрет', night:'Ночь', golden:'Золотой' };
      toast(`✦ AI: ${lutLabels[lutName] || lutName}`);
    }
  } catch (e) { /* silent */ }
  finally {
    setAIActive(false);
    scheduleAI(30000);
  }
}

function captureFrame() {
  const v = document.getElementById('video');
  if (!v.videoWidth) return null;
  const c = document.createElement('canvas');
  c.width = 320; c.height = Math.round(v.videoHeight / v.videoWidth * 320);
  const ctx = c.getContext('2d');
  if (S.facing === 'user') { ctx.save(); ctx.translate(c.width, 0); ctx.scale(-1, 1); }
  ctx.drawImage(v, 0, 0, c.width, c.height);
  if (S.facing === 'user') ctx.restore();
  return c.toDataURL('image/jpeg', 0.75).replace(/^data:[^,]+,/, '');
}

function applyAIParams(p) {
  const cl = (v, mn, mx, def) => {
    const n = (v === undefined || v === null || isNaN(+v)) ? def : +v;
    return Math.max(mn, Math.min(mx, n));
  };
  const lift = p.lift || {}, gamma = p.gamma || {}, gain = p.gain || {};
  S.tgt = {
    exposure:    cl(p.exposure,    -2,    2,    0),
    temperature: cl(p.temperature, 2500,  10000, 5600),
    tint:        cl(p.tint,        -50,   50,   0),
    contrast:    cl(p.contrast,    0,     2,    1),
    pivot:       cl(p.pivot,       0.1,   0.9,  0.5),
    saturation:  cl(p.saturation,  0,     2,    1),
    hue:         cl(p.hue,         -1,    1,    0),
    liftR:  cl(lift.r,  -0.2, 0.2, 0),
    liftG:  cl(lift.g,  -0.2, 0.2, 0),
    liftB:  cl(lift.b,  -0.2, 0.2, 0),
    gammaR: cl(gamma.r, -0.5, 0.5, 0),
    gammaG: cl(gamma.g, -0.5, 0.5, 0),
    gammaB: cl(gamma.b, -0.5, 0.5, 0),
    gainR:  cl(gain.r,  0.5,  2.0, 1),
    gainG:  cl(gain.g,  0.5,  2.0, 1),
    gainB:  cl(gain.b,  0.5,  2.0, 1),
    sharpness:   cl(p.sharpness,   0,     1,    0.5),
    vignette:    cl(p.vignette,    0,     1,    0),
    filmGrain:   cl(p.filmGrain,   0,     1,    0),
    lut:         LUTS[p.lut] ? p.lut : 'natural',
  };
}

function setAIActive(on) {
  S.aiActive = on;
  document.getElementById('ai-dot').classList.toggle('on', on);
  document.getElementById('ai-label').classList.toggle('on', on);
}

// ─── Render loop — smooth interpolation toward target params ──────────────────
const LERP_SPEED = 0.06; // per frame ~60fps → ~0.6s transition

function lerp(a, b, t) { return a + (b - a) * t; }

// Convert a Kelvin white-balance target into per-channel RGB multipliers.
// Camera WB is inverse of scene light: low K (warm camera) boosts red, high K boosts blue.
function kelvinToRGB(kelvin) {
  // Normalize around 5600K neutral; positive = warmer camera comp, negative = cooler.
  const d = (5600 - kelvin) / 5600; // >0 when kelvin<5600 (warm), <0 when cool
  return {
    r: 1 + d * 0.35,
    g: 1 + d * 0.05,
    b: 1 - d * 0.40,
  };
}

const INTERP_KEYS = [
  'exposure','temperature','tint','contrast','pivot','saturation','hue',
  'liftR','liftG','liftB','gammaR','gammaG','gammaB','gainR','gainG','gainB',
  'sharpness','vignette','filmGrain',
];

function startRenderLoop() {
  S.renderRunning = true;
  const video  = document.getElementById('video');
  const vign   = document.getElementById('vignette');
  const grain  = document.getElementById('grain');
  const gctx   = grain.getContext('2d');
  const fnR = document.getElementById('fnR');
  const fnG = document.getElementById('fnG');
  const fnB = document.getElementById('fnB');

  let grainT = 0;

  function frame() {
    S.animFrame = requestAnimationFrame(frame);

    // Smoothly interpolate every numeric param toward target
    const c = S.cur, t = S.tgt;
    for (const k of INTERP_KEYS) c[k] = lerp(c[k], t[k], LERP_SPEED);
    if (c.lut !== t.lut) c.lut = t.lut; // snap lut instantly

    const lut = LUTS[c.lut] || LUTS.natural;

    // ── White balance: Kelvin + tint → per-channel gain multipliers ──
    const wb = kelvinToRGB(c.temperature);
    const tintR = 1 + Math.max(0, c.tint) / 50 * 0.12;  // magenta adds R,B
    const tintG = 1 - Math.abs(c.tint) / 50 * 0.10 * (c.tint > 0 ? 1 : -1); // sign flips for green
    const tintB = 1 + Math.max(0, c.tint) / 50 * 0.12;

    // ── Lift / Gamma / Gain → SVG feComponentTransfer (per channel) ──
    // output = amplitude * input^exponent + offset  (amplitude=gain, exponent~gamma, offset=lift)
    // Fold LUT base grade + white balance into the channel gains/lifts.
    const setFunc = (fn, lift, gammaV, gain, wbMul, tintMul, lutLift, lutGain) => {
      const amplitude = Math.max(0.05, gain * wbMul * tintMul * lutGain);
      const exponent  = Math.max(0.2, Math.pow(2, -(gammaV + 0) ));      // gamma>0 → brighter mids
      const offset    = lift + lutLift;
      fn.setAttribute('amplitude', amplitude.toFixed(4));
      fn.setAttribute('exponent',  exponent.toFixed(4));
      fn.setAttribute('offset',    offset.toFixed(4));
    };
    setFunc(fnR, c.liftR, c.gammaR, c.gainR, wb.r, tintR, lut.liftR, lut.gainR);
    setFunc(fnG, c.liftG, c.gammaG, c.gainG, wb.g, tintG, lut.liftG, lut.gainG);
    setFunc(fnB, c.liftB, c.gammaB, c.gainB, wb.b, tintB, lut.liftB, lut.gainB);

    // ── Global tone via CSS filter (chained after the SVG grade) ──
    const brightness = Math.pow(2, c.exposure);
    const contrast   = c.contrast * lut.contrast;
    const sat        = c.saturation * lut.saturate;
    const hueDeg     = c.hue * 30 + lut.hueRot;

    video.style.filter = [
      'url(#bmd-grade)',
      `brightness(${brightness.toFixed(3)})`,
      `contrast(${contrast.toFixed(3)})`,
      `saturate(${sat.toFixed(3)})`,
      Math.abs(hueDeg) > 0.1 ? `hue-rotate(${hueDeg.toFixed(1)}deg)` : '',
    ].filter(Boolean).join(' ');

    // Vignette
    const v = c.vignette;
    if (v > 0.01) {
      const stop = Math.round((1 - v * 0.5) * 100);
      vign.style.background = `radial-gradient(ellipse at center, transparent ${stop}%, rgba(0,0,0,${(v * 0.85).toFixed(2)}) 100%)`;
    } else {
      vign.style.background = 'none';
    }

    // Film grain
    const gv = c.filmGrain;
    if (gv > 0.01) {
      grain.style.opacity = gv * 0.35;
      // Resize canvas to match screen if needed
      if (grain.width !== window.innerWidth) { grain.width = window.innerWidth; grain.height = window.innerHeight; }
      grainT++;
      if (grainT % 2 === 0) { // update grain every 2 frames
        drawGrain(gctx, grain.width, grain.height, gv);
      }
    } else {
      grain.style.opacity = 0;
    }
  }

  frame();
}

function drawGrain(ctx, w, h, intensity) {
  const imageData = ctx.createImageData(w, h);
  const data = imageData.data;
  const amount = intensity * 80;
  for (let i = 0; i < data.length; i += 4) {
    const n = (Math.random() - 0.5) * amount;
    data[i]     = 128 + n;
    data[i + 1] = 128 + n;
    data[i + 2] = 128 + n;
    data[i + 3] = 255;
  }
  ctx.putImageData(imageData, 0, 0);
}

// ─── Settings ─────────────────────────────────────────────────────────────────
document.getElementById('settings-btn').addEventListener('click', () => {
  document.getElementById('api-field').value = S.apiKey;
  document.getElementById('overlay').classList.add('show');
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('show');
});
function saveSettings() {
  S.apiKey = document.getElementById('api-field').value.trim();
  localStorage.setItem('ailens_key', S.apiKey);
  document.getElementById('overlay').classList.remove('show');
  if (S.apiKey) setTimeout(runAI, 400);
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
// Check whether the server already has a key configured (Railway env).
fetch('/api/config')
  .then(r => r.json())
  .then(cfg => {
    S.hasServerKey = !!cfg.hasServerKey;
    // Only prompt for a key if neither server nor user has one.
    if (!S.hasServerKey && !S.apiKey) {
      setTimeout(() => document.getElementById('overlay').classList.add('show'), 600);
    }
    if (S.hasServerKey) setTimeout(runAI, 1500);
  })
  .catch(() => {
    if (!S.apiKey) setTimeout(() => document.getElementById('overlay').classList.add('show'), 600);
  });

navigator.mediaDevices?.getUserMedia({ video: true, audio: true })
  .then(stream => { stream.getTracks().forEach(t => t.stop()); initCamera(); })
  .catch(() => {});
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AI Lens</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; overflow: hidden; background: #000; user-select: none; -webkit-user-select: none; }

    /* ─── Camera layer ─── */
    #app { position: fixed; inset: 0; }

    #video {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; background: #000;
    }

    /* Canvas for real-time LUT/grain rendering */
    #fx-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; opacity: 0;
      transition: opacity 0.8s ease;
    }
    #fx-canvas.active { opacity: 1; }

    /* Vignette overlay */
    #vignette {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0) 100%);
      transition: background 1.2s ease;
      z-index: 2;
    }

    /* Film grain overlay */
    #grain {
      position: absolute; inset: 0; pointer-events: none; z-index: 3;
      opacity: 0; mix-blend-mode: overlay;
    }

    /* ─── UI overlay ─── */
    .ui {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column; justify-content: flex-end;
      pointer-events: none;
    }

    /* Bottom fade */
    .bottom-fade {
      position: absolute; bottom: 0; left: 0; right: 0; height: 200px;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
      pointer-events: none;
    }

    /* AI status — top left, barely visible */
    .ai-status {
      position: absolute;
      top: calc(env(safe-area-inset-top, 12px) + 16px);
      left: 20px;
      display: flex; align-items: center; gap: 7px;
      pointer-events: none;
    }
    .ai-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.4s, box-shadow 0.4s;
    }
    .ai-dot.on { background: #30d158; box-shadow: 0 0 6px #30d158; animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .ai-label {
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 11px; font-weight: 300;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
      transition: color 0.4s;
    }
    .ai-label.on { color: rgba(255,255,255,0.5); }

    /* Settings button — top right */
    .settings-btn {
      position: absolute;
      top: calc(env(safe-area-inset-top, 12px) + 10px);
      right: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,0.25); border: none;
      color: rgba(255,255,255,0.5); font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto; backdrop-filter: blur(10px);
      transition: background 0.2s;
    }
    .settings-btn:active { background: rgba(255,255,255,0.15); }

    /* REC timer */
    .rec-timer {
      position: absolute;
      top: calc(env(safe-area-inset-top, 12px) + 18px);
      left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 7px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .rec-timer.show { opacity: 1; }
    .rec-dot { width: 7px; height: 7px; border-radius: 50%; background: #ff3b30; animation: blink 1s infinite; }
    .rec-time {
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 14px; font-weight: 500; color: #fff;
      font-variant-numeric: tabular-nums;
    }

    /* Controls */
    .controls {
      display: flex; align-items: center; justify-content: center;
      gap: 64px;
      padding-bottom: calc(env(safe-area-inset-bottom, 28px) + 28px);
      padding-top: 10px;
      pointer-events: auto; position: relative;
    }

    /* Record button */
    .rec-btn {
      width: 72px; height: 72px; border-radius: 50%;
      position: relative; cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .rec-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.85);
    }
    .rec-inner {
      position: absolute; inset: 7px; border-radius: 50%;
      background: #fff;
      transition: border-radius 0.22s cubic-bezier(.4,0,.2,1),
                  inset 0.22s cubic-bezier(.4,0,.2,1),
                  background 0.18s;
    }
    .rec-btn.recording .rec-inner {
      inset: 19px; border-radius: 5px; background: #ff3b30;
    }
    .rec-btn.recording { animation: pulse-rec 1.1s ease-in-out infinite; }
    @keyframes pulse-rec { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

    /* Flip button */
    .flip-btn {
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(20px);
      transition: transform 0.38s cubic-bezier(.4,0,.2,1), background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .flip-btn:active { background: rgba(255,255,255,0.25); }
    .flip-btn.spinning { transform: rotate(180deg); }

    /* Toast */
    .toast {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 28px) + 120px);
      left: 50%; transform: translateX(-50%) translateY(10px);
      background: rgba(0,0,0,0.7); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px; padding: 9px 20px;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.9);
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap; z-index: 20;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Permission screen */
    #perm {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      z-index: 100; font-family: -apple-system, system-ui, sans-serif;
    }
    #perm.hidden { display: none; }
    #perm p { color: rgba(255,255,255,0.75); font-size: 17px; font-weight: 300; }
    #perm button {
      background: #fff; border: none; border-radius: 14px;
      padding: 13px 36px; font-size: 16px; font-weight: 600;
      color: #000; cursor: pointer; font-family: inherit;
    }

    /* Settings sheet */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px); z-index: 50;
      display: flex; align-items: flex-end;
      opacity: 0; transition: opacity 0.28s; pointer-events: none;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .sheet {
      width: 100%; background: #161616;
      border-radius: 22px 22px 0 0;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 22px 20px calc(env(safe-area-inset-bottom, 20px) + 22px);
      transform: translateY(100%); transition: transform 0.32s cubic-bezier(.4,0,.2,1);
      font-family: -apple-system, system-ui, sans-serif;
    }
    .overlay.show .sheet { transform: translateY(0); }
    .sheet-handle { width: 34px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.15); margin: 0 auto 22px; }
    .sheet-title { font-size: 20px; font-weight: 200; font-style: italic; color: #fff; margin-bottom: 22px; letter-spacing: 0.3px; }
    .field-lbl { font-size: 11px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 9px; }
    .field {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 11px; padding: 13px 15px; font-size: 15px; color: #fff;
      outline: none; font-family: inherit; margin-bottom: 8px; transition: border-color 0.2s;
    }
    .field:focus { border-color: rgba(255,255,255,0.25); }
    .field::placeholder { color: rgba(255,255,255,0.2); }
    .field-hint { font-size: 11px; color: rgba(255,255,255,0.25); margin-bottom: 22px; line-height: 1.5; }
    .save-btn {
      width: 100%; padding: 14px; background: #fff; border: none; border-radius: 13px;
      font-size: 15px; font-weight: 600; color: #000; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .save-btn:active { opacity: 0.8; }
  </style>
</head>
<body>

<div id="perm">
  <p>Нужен доступ к камере</p>
  <button onclick="initCamera()">Разрешить</button>
</div>

<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="fx-canvas"></canvas>
  <div id="vignette"></div>
  <canvas id="grain"></canvas>

  <div class="ui">
    <div class="bottom-fade"></div>

    <!-- AI status -->
    <div class="ai-status">
      <div class="ai-dot" id="ai-dot"></div>
      <div class="ai-label" id="ai-label">AI LENS</div>
    </div>

    <!-- Settings -->
    <button class="settings-btn" id="settings-btn">⚙</button>

    <!-- REC timer -->
    <div class="rec-timer" id="rec-timer">
      <div class="rec-dot"></div>
      <div class="rec-time" id="rec-time">0:00</div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="rec-btn" id="rec-btn" onclick="toggleRecord()">
        <div class="rec-ring"></div>
        <div class="rec-inner"></div>
      </div>
      <button class="flip-btn" id="flip-btn" onclick="flipCamera()">⟳</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<!-- Settings sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Настройки</div>
    <div class="field-lbl">Anthropic API ключ</div>
    <input type="password" class="field" id="api-field" placeholder="sk-ant-...">
    <div class="field-hint">Получить ключ: console.anthropic.com<br>Ключ хранится только в браузере.</div>
    <button class="save-btn" onclick="saveSettings()">Сохранить</button>
  </div>
</div>

<script>
// ─── LUT presets → CSS filter values ─────────────────────────────────────────
const LUTS = {
  natural:    { sepia: 0,    hueRot: 0,   saturate: 1.0 },
  film:       { sepia: 0.08, hueRot: -3,  saturate: 0.88 },
  cinematic:  { sepia: 0.04, hueRot: -6,  saturate: 1.25 },
  portrait:   { sepia: 0.12, hueRot: 3,   saturate: 1.1  },
  night:      { sepia: 0.06, hueRot: 5,   saturate: 0.75 },
  golden:     { sepia: 0.22, hueRot: 8,   saturate: 1.4  },
};

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  apiKey: localStorage.getItem('ailens_key') || '',
  facing: 'environment',
  stream: null,
  isRecording: false,
  recorder: null,
  chunks: [],
  lastBlob: null,
  recStart: null,
  recTick: null,
  aiTimer: null,
  aiActive: false,
  // Current applied params (animated toward target)
  cur: defaultParams(),
  tgt: defaultParams(),
  animFrame: null,
};

function defaultParams() {
  return {
    exposure: 0, contrast: 1, saturation: 1, temperature: 0, tint: 0,
    shadows: 0, highlights: 0, blacks: 0, whites: 0,
    sharpness: 0.5, vignette: 0, filmGrain: 0, lut: 'natural',
  };
}

// ─── Camera ───────────────────────────────────────────────────────────────────
async function initCamera() {
  try {
    if (S.stream) S.stream.getTracks().forEach(t => t.stop());
    S.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: S.facing }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: true,
    });
    document.getElementById('video').srcObject = S.stream;
    document.getElementById('perm').classList.add('hidden');
    scheduleAI(800);
    startRenderLoop();
  } catch (e) {
    try {
      S.stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('video').srcObject = S.stream;
      document.getElementById('perm').classList.add('hidden');
      scheduleAI(800);
      startRenderLoop();
    } catch (e2) {
      document.querySelector('#perm p').textContent = 'Камера недоступна: ' + e2.message;
    }
  }
}

function flipCamera() {
  const btn = document.getElementById('flip-btn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 400);
  S.facing = S.facing === 'environment' ? 'user' : 'environment';
  initCamera();
}

// ─── Recording ────────────────────────────────────────────────────────────────
function toggleRecord() {
  S.isRecording ? stopRecord() : startRecord();
}

function startRecord() {
  if (!S.stream) return;
  S.chunks = [];
  const mime = ['video/mp4;codecs=h264','video/mp4','video/webm;codecs=vp9','video/webm']
    .find(t => MediaRecorder.isTypeSupported(t)) || '';
  try { S.recorder = new MediaRecorder(S.stream, mime ? { mimeType: mime } : {}); }
  catch { S.recorder = new MediaRecorder(S.stream); }

  S.recorder.ondataavailable = e => { if (e.data?.size) S.chunks.push(e.data); };
  S.recorder.onstop = () => {
    S.lastBlob = new Blob(S.chunks, { type: S.recorder.mimeType });
    saveVideo();
  };
  S.recorder.start(1000);
  S.isRecording = true;
  S.recStart = Date.now();
  document.getElementById('rec-btn').classList.add('recording');
  document.getElementById('rec-timer').classList.add('show');

  S.recTick = setInterval(() => {
    const s = Math.floor((Date.now() - S.recStart) / 1000);
    document.getElementById('rec-time').textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }, 500);
}

function stopRecord() {
  if (S.recorder?.state !== 'inactive') S.recorder.stop();
  S.isRecording = false;
  clearInterval(S.recTick);
  document.getElementById('rec-btn').classList.remove('recording');
  document.getElementById('rec-timer').classList.remove('show');
}

async function saveVideo() {
  if (!S.lastBlob) return;
  const ext = S.lastBlob.type.includes('mp4') ? 'mp4' : 'webm';
  const fileName = `ailens-${Date.now()}.${ext}`;

  // 1) Native share/save sheet (lets user save to gallery on mobile)
  try {
    const file = new File([S.lastBlob], fileName, { type: S.lastBlob.type });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'AI Lens' });
      toast('✓ Видео сохранено');
      return;
    }
  } catch (e) {
    if (e.name === 'AbortError') return; // user cancelled share sheet
  }

  // 2) Fallback — auto download to device
  const url = URL.createObjectURL(S.lastBlob);
  const a = document.createElement('a');
  a.href = url; a.download = fileName; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
  toast('✓ Видео сохранено');
}

// ─── AI Analysis ─────────────────────────────────────────────────────────────
function scheduleAI(delay = 30000) {
  clearTimeout(S.aiTimer);
  S.aiTimer = setTimeout(runAI, delay);
}

async function runAI() {
  if (!S.apiKey) { scheduleAI(30000); return; }
  const b64 = captureFrame();
  if (!b64) { scheduleAI(10000); return; }

  setAIActive(true);
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': S.apiKey },
      body: JSON.stringify({ imageBase64: b64 }),
    });
    if (res.ok) {
      const params = await res.json();
      applyAIParams(params);
    }
  } catch (e) { /* silent */ }
  finally {
    setAIActive(false);
    scheduleAI(30000);
  }
}

function captureFrame() {
  const v = document.getElementById('video');
  if (!v.videoWidth) return null;
  const c = document.createElement('canvas');
  c.width = 320; c.height = Math.round(v.videoHeight / v.videoWidth * 320);
  const ctx = c.getContext('2d');
  if (S.facing === 'user') { ctx.save(); ctx.translate(c.width, 0); ctx.scale(-1, 1); }
  ctx.drawImage(v, 0, 0, c.width, c.height);
  if (S.facing === 'user') ctx.restore();
  return c.toDataURL('image/jpeg', 0.75).replace(/^data:[^,]+,/, '');
}

function applyAIParams(p) {
  const clamp = (v, mn, mx) => Math.max(mn, Math.min(mx, v));
  S.tgt = {
    exposure:    clamp(+p.exposure    || 0,    -2,   2),
    contrast:    clamp(+p.contrast    || 1,  0.5, 2.0),
    saturation:  clamp(+p.saturation  || 1,    0, 2.5),
    temperature: clamp(+p.temperature || 0, -100, 100),
    tint:        clamp(+p.tint        || 0, -100, 100),
    shadows:     clamp(+p.shadows     || 0,   -1,   1),
    highlights:  clamp(+p.highlights  || 0,   -1,   1),
    blacks:      clamp(+p.blacks      || 0,   -1,   1),
    whites:      clamp(+p.whites      || 0,   -1,   1),
    sharpness:   clamp(+p.sharpness   || 0.5,  0,   1),
    vignette:    clamp(+p.vignette    || 0,    0,   1),
    filmGrain:   clamp(+p.filmGrain   || 0,    0,   1),
    lut:         LUTS[p.lut] ? p.lut : 'natural',
  };
}

function setAIActive(on) {
  S.aiActive = on;
  document.getElementById('ai-dot').classList.toggle('on', on);
  document.getElementById('ai-label').classList.toggle('on', on);
}

// ─── Render loop — smooth interpolation toward target params ──────────────────
const LERP_SPEED = 0.025; // per frame ~60fps → ~1.5s transition

function lerp(a, b, t) { return a + (b - a) * t; }

function startRenderLoop() {
  const video  = document.getElementById('video');
  const vign   = document.getElementById('vignette');
  const grain  = document.getElementById('grain');
  const gctx   = grain.getContext('2d');

  let grainT = 0;

  function frame() {
    S.animFrame = requestAnimationFrame(frame);

    // Interpolate all params smoothly
    const c = S.cur, t = S.tgt;
    for (const k of ['exposure','contrast','saturation','temperature','tint',
                      'shadows','highlights','blacks','whites','sharpness','vignette','filmGrain']) {
      c[k] = lerp(c[k], t[k], LERP_SPEED);
    }
    if (c.lut !== t.lut) c.lut = t.lut; // snap lut instantly

    // Build CSS filter for video
    const lut = LUTS[c.lut] || LUTS.natural;

    // exposure → brightness (EV: 2^EV)
    const brightness = Math.pow(2, c.exposure);
    // temperature → hue-rotate proxy + sepia blend
    const tempHue = c.temperature * 0.25;         // warm = +hue, cool = -hue
    const tempSepia = Math.max(0, c.temperature) / 800; // subtle sepia for warmth
    const tintHue = c.tint * 0.15;

    // shadows/highlights affect brightness via proxy
    const shadowBoost = 1 + c.shadows * 0.3;
    const highlightCut = 1 + c.highlights * 0.15;
    const brightnessTotal = brightness * shadowBoost * highlightCut;

    // whites/blacks via contrast proxy
    const blacksContrast = c.contrast * (1 + c.blacks * 0.2);
    const whitesContrast = blacksContrast * (1 + c.whites * 0.15);

    // saturation: combine param + lut
    const sat = c.saturation * lut.saturate;

    // sepia: combine lut + temp warmth
    const sepia = Math.min(1, lut.sepia + tempSepia);

    // hue-rotate: lut + temp + tint
    const hue = lut.hueRot + tempHue + tintHue;

    const filter = [
      `brightness(${brightnessTotal.toFixed(3)})`,
      `contrast(${whitesContrast.toFixed(3)})`,
      `saturate(${sat.toFixed(3)})`,
      sepia > 0.001 ? `sepia(${sepia.toFixed(3)})` : '',
      Math.abs(hue) > 0.1 ? `hue-rotate(${hue.toFixed(1)}deg)` : '',
    ].filter(Boolean).join(' ');

    video.style.filter = filter;

    // Cool color channel: add subtle blue overlay for negative temperature
    const coolness = Math.max(0, -c.temperature) / 200;
    if (coolness > 0.01) {
      video.style.setProperty('--cool', coolness);
    }

    // Vignette
    const v = c.vignette;
    if (v > 0.01) {
      const stop = Math.round((1 - v * 0.5) * 100);
      vign.style.background = `radial-gradient(ellipse at center, transparent ${stop}%, rgba(0,0,0,${(v * 0.85).toFixed(2)}) 100%)`;
    } else {
      vign.style.background = 'none';
    }

    // Film grain
    const gv = c.filmGrain;
    if (gv > 0.01) {
      grain.style.opacity = gv * 0.35;
      // Resize canvas to match screen if needed
      if (grain.width !== window.innerWidth) { grain.width = window.innerWidth; grain.height = window.innerHeight; }
      grainT++;
      if (grainT % 2 === 0) { // update grain every 2 frames
        drawGrain(gctx, grain.width, grain.height, gv);
      }
    } else {
      grain.style.opacity = 0;
    }
  }

  frame();
}

function drawGrain(ctx, w, h, intensity) {
  const imageData = ctx.createImageData(w, h);
  const data = imageData.data;
  const amount = intensity * 80;
  for (let i = 0; i < data.length; i += 4) {
    const n = (Math.random() - 0.5) * amount;
    data[i]     = 128 + n;
    data[i + 1] = 128 + n;
    data[i + 2] = 128 + n;
    data[i + 3] = 255;
  }
  ctx.putImageData(imageData, 0, 0);
}

// ─── Settings ─────────────────────────────────────────────────────────────────
document.getElementById('settings-btn').addEventListener('click', () => {
  document.getElementById('api-field').value = S.apiKey;
  document.getElementById('overlay').classList.add('show');
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('show');
});
function saveSettings() {
  S.apiKey = document.getElementById('api-field').value.trim();
  localStorage.setItem('ailens_key', S.apiKey);
  document.getElementById('overlay').classList.remove('show');
  if (S.apiKey) setTimeout(runAI, 400);
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
navigator.mediaDevices?.getUserMedia({ video: true, audio: true })
  .then(stream => { stream.getTracks().forEach(t => t.stop()); initCamera(); })
  .catch(() => {});

if (!S.apiKey) setTimeout(() => document.getElementById('overlay').classList.add('show'), 600);
</script>
</body>
</html>
